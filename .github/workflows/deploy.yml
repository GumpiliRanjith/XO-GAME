name: Deploy XO Game

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: YOUR_EC2_PUBLIC_IP
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd XO-GAME
            git pull
            docker stop xo-game || true
            docker rm xo-game || true
            docker build -t xo-game .
            docker run -d -p 80:80 xo-game
